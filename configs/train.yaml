model:
  input_channels: 1
  num_classes: 10
  resnet_version: "resnet18"
  dropout: 0.5
  use_delta: true

training:
  batch_size: 8
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.01
  early_stopping_patience: 10
  optimizer: "adamw"
  scheduler: "cosine"
  seed: 42

split:
  n_splits: 5 # 5-Fold: train=12 klip/kelas, val=3 klip/kelas

augmentation:
  enabled: true
  temporal_resample:
    enabled: true
    speed_min: 0.85
    speed_max: 1.15
  jitter:
    enabled: true
    std: 0.01
  scale:
    enabled: true
    min: 0.9
    max: 1.1
  mask:
    enabled: true
    prob: 0.1

paths:
  npy_dir: "data/processed/npy"
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
  plot_dir: "outputs/plots"
